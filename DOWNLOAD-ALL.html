function b64toBlob(b64,type){
  var bin=atob(b64),arr=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:type});
}

function downloadFile(name,data,btn){
  var blob=b64toBlob(data,'text/html');
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download=name;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  if(btn){btn.textContent='Downloaded ✓';btn.className='file-btn done';}
}

function downloadAll(){
  var delay=0;
  files.forEach(function(f,i){
    setTimeout(function(){
      var btn=document.getElementById('btn-'+i);
      downloadFile(f.name,f.data,btn);
      document.getElementById('prog').textContent=(i+1)+' of '+files.length+' downloaded...';
      if(i===files.length-1) document.getElementById('prog').textContent='All '+files.length+' files downloaded. ✓';
    },delay);
    delay+=600;
  });
}

// Build file list
var list=document.getElementById('fileList');
files.forEach(function(f,i){
  var row=document.createElement('div');
  row.className='file-row';
  row.innerHTML='<span class="file-name">'+f.name+'</span><button class="file-btn" id="btn-'+i+'" onclick="downloadFile(files['+i+'].name,files['+i+'].data,this)">Download</button>';
  list.appendChild(row);
});
</script>
